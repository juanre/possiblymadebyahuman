services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmbah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pmbah}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmbah} -d ${POSTGRES_DB:-pmbah}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ${LOCAL_IMAGE:-possiblymadebyahuman-local:latest}
    restart: unless-stopped
    ports:
      - "${PMBAH_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-.env.local-container}
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pmbah}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pmbah}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 12

volumes:
  postgres_data:
