services:
  app:
    image: ${IMAGE:-possiblymadebyahuman:latest}
    restart: unless-stopped
    ports:
      - "${PMBAH_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-.env.localprod}
    environment:
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - set Neon connection string}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
